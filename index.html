<!DOCTYPE html>
<html>
<head>
    <title>K53 Practice</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

    <!-- START SCREEN -->
    <div id="start-screen">
        <h1>K53 Practice Test</h1>
        <p>Select a test:</p>

        <button onclick="startQuiz('signs')">Road Signs Test</button>
        <button onclick="startQuiz('rules')">Rules of the Road Test</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" style="display:none;">
        <h3 id="progress"></h3>
        <h3 id="timer"></h3>

        <h2 id="question"></h2>

        <div id="options"></div>

        <button id="next-btn" style="display:none;">Next</button>

        <!-- SCORE SCREEN -->
        <div id="score-screen" style="display:none;">
            <h2 id="final-score"></h2>
            <p id="message"></p>
        </div>

        <button id="restart-btn" style="display:none;">Restart</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
